name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Plataforma (ios / android / all)'
        required: true
        default: 'all'
      lane:
        description: 'Lane (beta / release)'
        required: true
        default: 'beta'

jobs:
  deploy-android:
    name: Android Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all' || startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: task_manager_AppAcademiaV003

      - name: Flutter pub get
        run: flutter pub get
        working-directory: task_manager_AppAcademiaV003

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > task_manager_AppAcademiaV003/android/app/keystore.jks

      - name: Decode Google Play Key
        run: echo "${{ secrets.GOOGLE_PLAY_JSON_KEY_BASE64 }}" | base64 --decode > task_manager_AppAcademiaV003/fastlane/google-play-key.json

      - name: Run Fastlane Android
        run: bundle exec fastlane android ${{ github.event.inputs.lane || 'beta' }}
        working-directory: task_manager_AppAcademiaV003
        env:
          ANDROID_KEYSTORE_PATH: android/app/keystore.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_PLAY_JSON_KEY: fastlane/google-play-key.json
          SLACK_URL: ${{ secrets.SLACK_URL }}

  deploy-ios:
    name: iOS Deploy
    runs-on: macos-latest
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all' || startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: task_manager_AppAcademiaV003

      - name: Flutter pub get
        run: flutter pub get
        working-directory: task_manager_AppAcademiaV003

      - name: Decode App Store Connect API Key
        run: echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > task_manager_AppAcademiaV003/fastlane/AuthKey.p8

      - name: Run Fastlane iOS
        run: bundle exec fastlane ios ${{ github.event.inputs.lane || 'beta' }}
        working-directory: task_manager_AppAcademiaV003
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID:       ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID:    ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_FILEPATH: fastlane/AuthKey.p8
          MATCH_GIT_URL:   ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD:  ${{ secrets.MATCH_PASSWORD }}
          APPLE_TEAM_ID:   ${{ secrets.APPLE_TEAM_ID }}
          SLACK_URL: ${{ secrets.SLACK_URL }}
